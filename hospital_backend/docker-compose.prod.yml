services:
  postgres:
    image: postgres:16
    container_name: hospital_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hospital_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ${POSTGRES_DATA_PATH:-/srv/hospital/postgres}:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hospital_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital_backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${MEDIA_PATH:-/srv/hospital/media}:/app/backend/media
      - ${STATIC_PATH:-/srv/hospital/staticfiles}:/app/backend/staticfiles
    command:
      [
        "gunicorn",
        "backend.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "3",
        "--timeout",
        "120",
      ]
    ports:
      - "8000:8000"
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: hospital_nginx
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-api.example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${LETSENCRYPT_PATH:-/srv/hospital/letsencrypt}:/etc/letsencrypt
      - ${CERTBOT_WWW_PATH:-/srv/hospital/certbot-www}:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    container_name: hospital_certbot
    profiles: ["certbot"]
    volumes:
      - ${LETSENCRYPT_PATH:-/srv/hospital/letsencrypt}:/etc/letsencrypt
      - ${CERTBOT_WWW_PATH:-/srv/hospital/certbot-www}:/var/www/certbot
    ports:
      - "80:80"
